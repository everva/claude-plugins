# Dark Factory Configuration
# Project-specific settings for the Dark Factory autonomous pipeline.
# Edit this file to customize risk factors, ship model, and governance rules.

# Project identity
project_name: "MyProject"
github_repo: "owner/repo"

# Ship strategy: direct-commit | pr-creation | pr-label
ship_model: "pr-creation"

# Holdout directory (relative to project root)
holdout_dir: ".dark-factory/holdouts"

# Backlog file (relative to project root)
backlog_file: ".dark-factory/backlog.md"

# Backlog format: spec-only | issue+spec
backlog_format: "issue+spec"

# Governance ceiling for Ralph loop (only process tasks up to this tier)
governance_ceiling: "T1"

# Holdout validation — multi-run quorum voting
# Each holdout validation runs N times; requires quorum passes above threshold
holdout_runs: 3           # Number of independent validation runs per task
holdout_quorum: 2         # Minimum passes required (out of holdout_runs)
holdout_threshold: 90     # Minimum overall_score to count as a pass

# Retry limits — max attempts before marking a spec as exhausted
max_attempts_per_spec: 3

# Guardrails file — failure patterns from previous iterations
# Implementation agents read this file to avoid repeating past mistakes
guardrails_file: ".dark-factory/failure-patterns.md"

# Risk factors — customize these for your project
# Each factor adds its score to the risk total when the pattern matches
# the issue labels or layer name.
risk_factors:
  - pattern: "auth|login|session|jwt|token"
    score: 30
    label: "Auth/Security code"
  - pattern: "payment|stripe|billing|invoice"
    score: 30
    label: "Payment processing"
  - pattern: "migration|ALTER TABLE|CREATE TABLE"
    score: 20
    label: "Database migration"
  - pattern: "api-contract|shared-types"
    score: 20
    label: "API contract change"
  - pattern: "dependency|package.json|Podfile|build.gradle"
    score: 15
    label: "New dependency"
